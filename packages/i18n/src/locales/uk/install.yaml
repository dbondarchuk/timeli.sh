              name: Лікування для встановлення зв’язків
              description: "**Зміцнення** для захисту волосся під час хімічної обробки."
            full_color-addon-hair-2:
              name: Додаток для оновлення рута
              description: >-
                **Невелике сфокусоване коріння** при бронюванні разом із
