  beauty:
    hair_stylist:
      label: Hair Stylist
      services:
        women_s_haircut_style:
          name: Women's Haircut & Style
          description: >-
            **A personalized haircut** tailored to your style and face shape.
            Includes wash, precision cut, and blowout for a finished look.
          addons:
            women_s_haircut_style-addon-beauty-1:
              name: Toning gloss refresh
              description: >-
                **Semi-permanent gloss** to revive shine and tone between full
                visits.
            women_s_haircut_style-addon-hair-2:
              name: Deep conditioning mask
              description: >-
                **Intensive moisture treatment** after your cut for softer,
                smoother hair.
        men_s_haircut:
          name: Men's Haircut
          description: >-
            **A clean, precise haircut** including consultation and styling.
            Perfect for regular maintenance and updated looks.
          addons:
            men_s_haircut-addon-beauty-1:
              name: Beard trim & line-up
              description: >-
                **Clean edges and beard shaping** so your haircut and beard
                match.
        full_color:
          name: Full Color
          description: >-
            **Complete color application** with consultation and professional
            finishing. Ideal for full head color or major transformations.
          addons:
            full_color-addon-beauty-1:
              name: Bond-building treatment
              description: >-
                **Strengthening step** to help protect hair during chemical
                processing.
            full_color-addon-hair-2:
              name: Root refresh add-on
              description: >-
                **Small focused root touch-up** when booked together with a full
                color (scope-limited).
    nail_technician:
      label: Nail Technician
      services:
        basic_manicure:
          name: Basic Manicure
          description: >-
            **Nail shaping and care** including cuticle treatment and polish. A
            quick and refreshing maintenance service.
          addons:
            basic_manicure-addon-beauty-1:
              name: Paraffin wax dip
              description: >-
                **Warm wax treatment** for softer hands and cuticles before
                polish.
            basic_manicure-addon-nails-2:
              name: Nail art accent
              description: "**Simple design or French tips** on two accent nails."
        gel_manicure:
          name: Gel Manicure
          description: >-
            **Durable gel polish application** with professional curing.
            Includes nail prep and long-lasting finish.
          addons:
            gel_manicure-addon-beauty-1:
              name: Gel removal
              description: "**Safe soak-off** when removing existing gel before a new set."
            gel_manicure-addon-nails-2:
              name: Extended hand massage
              description: "**Extra massage time** beyond the standard gel service."
        acrylic_full_set:
          name: Acrylic Full Set
          description: >-
            **Acrylic nail enhancement** with custom shaping and polish. Ideal
            for clients wanting additional length or design.
          addons:
            acrylic_full_set-addon-beauty-1:
              name: Length or shape upgrade
              description: >-
                **Longer extensions or specialty shape** when discussed in
                advance.
            acrylic_full_set-addon-nails-2:
              name: Crystal or foil accents
              description: "**Decorative accents** on a few nails for events or photos."
    esthetician:
      label: Esthetician
      services:
        classic_facial:
          name: Classic Facial
          description: >-
            **Deep-clean facial treatment** to refresh skin tone and texture.
            Includes cleansing, exfoliation, mask, and moisturizing.
          addons:
            classic_facial-addon-beauty-1:
              name: High-frequency treatment
              description: >-
                **Device add-on** often used on breakout-prone or congested
                areas.
            classic_facial-addon-skin-2:
              name: LED boost
              description: >-
                **Targeted LED session** to support calming or brightening
                goals.
        microdermabrasion:
          name: Microdermabrasion
          description: >-
            **Non-invasive resurfacing** to reduce fine lines and uneven
            texture. Includes pre- and post-care guidance.
          addons:
            microdermabrasion-addon-beauty-1:
              name: Cooling mask
              description: "**Soothing mask** after exfoliation to calm redness."
            microdermabrasion-addon-skin-2:
              name: Neck & décolleté
              description: >-
                **Extend resurfacing** to neck and upper chest in the same
                visit.
        acne_treatment:
          name: Acne Treatment
          description: >-
            **Targeted acne therapy** using clinical-grade products and careful
            extraction when needed. Aimed to calm skin and reduce breakouts.
          addons:
            acne_treatment-addon-beauty-1:
              name: High-frequency focus
              description: "**Extra time on congested zones** with antibacterial setting."
            acne_treatment-addon-skin-2:
              name: Cryo globe massage
              description: "**Cool massage** to soothe skin after extractions."
