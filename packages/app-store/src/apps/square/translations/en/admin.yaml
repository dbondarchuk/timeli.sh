title: Square
app:
  displayName: Square
  description: |-
    **Square** is a payment service businesses use to take **credit and debit cards** and **digital wallets** (including **Google Pay** where it is available) online.

    **Timeli.sh** connects to your Square account so clients can **pay when they book**—cards and Google Pay at checkout—while the actual charge runs through Square.
form:
  connect: Connect <app></app>
  reconnect: Reconnect <app></app>
  pendingAuthorization: Waiting for Square authorization…
statusText:
  redirect_missing_app_id: Authorization response is missing the app id
  redirect_missing_code: Authorization response is missing the authorization code
  access_denied: Square access was denied
  oauth_error: Square returned an OAuth error
  not_authorized: Square did not return the required tokens
  no_locations: No Square locations were found for this account
  missing_oauth_config: Square OAuth is not configured on the server
  token_refresh_failed: Could not refresh the Square access token
  app_not_configured: Square is not connected
  payment_failed: Square could not process the payment
  payment_incomplete: Square payment did not complete
validation:
  locationId:
    required: Square location id is required
  merchantId:
    required: Square merchant id is required
  paymentIntentId:
    required: Payment intent id is required
  sourceId:
    required: Payment source id is required

