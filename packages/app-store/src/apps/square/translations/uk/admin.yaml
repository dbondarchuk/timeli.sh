title: Square
app:
  displayName: Square
  description: |-
    **Square** - платіжний сервіс, яким користуються бізнеси, щоб приймати **кредитні та дебетові картки** й **цифрові гаманці** (зокрема **Google Pay**, де це доступно) в інтернеті.

    **Timeli.sh** підключається до вашого облікового запису Square, щоб клієнти могли **оплатити під час бронювання** - карткою та Google Pay на сторінці оплати, а сам платіж проходить через Square.
form:
  connect: Підключити <app></app>
  reconnect: Підключити знову <app></app>
  pendingAuthorization: Очікується авторизація Square…
  inStoreSync:
    label: Синхронізувати очні карткові платежі
    description: Автоматично імпортувати очні платежі Square через вебхук payment.updated і зіставляти їх із записами.
    save: Зберегти налаштування синхронізації
    saveSuccess: Налаштування синхронізації Square збережено
    saveError: Помилка збереження налаштувань синхронізації Square
  matchWindow:
    label: Вікно зіставлення (хвилини)
    description: Наскільки час завершення запису може відрізнятися від часу платежу, щоб запис ще вважався кандидатом.
statusText:
  sync_settings_saved: Налаштування синхронізації Square збережено
