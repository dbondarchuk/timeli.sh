app:
  displayName: Gift Card Studio
  description: Manage gift card designs and sell gift cards through your website.
  pages:
    main:
      title: Designs
      description: Manage gift card designs
    new:
      label: New Design
      title: Create Design
      description: Create a new gift card design
    edit:
      title: Edit Design
      description: Edit gift card design
      notFound: Design not found
    purchases:
      title: Purchased Gift Cards
      description: View all purchased gift cards
    purchasesNew:
      title: Manual Gift Card Purchase
      description: Create a gift card purchase manually
    settings:
      title: Settings
      description: Gift Card Studio settings
designs:
  table:
    filters:
      status: Status
      active: Active
      archived: Archived
    actions:
      create: Create Design
      edit: Edit
      archive: Archive
      unarchive: Unarchive
      delete: Delete
      purchase: Purchase
      clone: Clone
    archiveSelected:
      label: Archive selected {count, plural, =1 {design} other {# designs}}
      description: Archive {count, plural, =1 {selected design} other {# selected designs}}? They will be hidden from customers on your website.
      confirm: Archive {count, plural, =1 {selected design} other {# selected designs}}
    unarchiveSelected:
      label: Unarchive selected {count, plural, =1 {design} other {# designs}}
      description: Unarchive {count, plural, =1 {selected design} other {# selected designs}}? They will be visible again on your website.
      confirm: Unarchive {count, plural, =1 {selected design} other {# selected designs}}
    deleteSelected:
      label: Delete selected {count, plural, =1 {design} other {# designs}}
      description: Are you sure you want to delete {count, plural, =1 {selected design} other {# selected designs}}? This action cannot be undone.
      confirm: Delete {count, plural, =1 {selected design} other {# selected designs}}
    archive:
      title: Archive design
      description: Archive design {name}? It will be hidden from customers on your website.
      confirm: Archive
    unarchive:
      title: Unarchive design
      description: Unarchive design {name}? It will be visible again on your website.
      confirm: Unarchive
    delete:
      title: Delete Design
      description: Are you sure you want to delete design {name}? This action cannot be undone.
      confirm: Yes, delete
      cannotDelete: "Cannot delete: gift cards have been purchased with this design."
    toast:
      delete: Design {name} deleted successfully
      deleteError: Failed to delete design
      archived: Design {name} archived
      unarchived: Design {name} unarchived
      archiveError: Failed to archive design
      unarchiveError: Failed to unarchive design
      designsArchived: "{count, plural, =1 {Design} other {# designs}} archived"
      designsUnarchived: "{count, plural, =1 {Design} other {# designs}} unarchived"
      designsDeleted: "{count, plural, =1 {Design} other {# designs}} deleted"
    columns:
      name: Name
      status: Status
      purchasesCount: Purchases
      createdAt: Created At
    status:
      archived: Archived
      active: Active
  form:
    name: Name
    namePlaceholder: Design name
    design: Card design
    archivedNotice: This design is archived and will not be visible to customers.
    toasts:
      updated: Design {name} updated successfully
      updatedError: Failed to update design
      created: Design {name} created successfully
      createdError: Failed to create design
