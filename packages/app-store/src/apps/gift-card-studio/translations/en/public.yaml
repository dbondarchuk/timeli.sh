validation:
  purchase:
    designId:
      required: Design is required
    amount:
      required: Amount is required
      min: Amount must be at least ${min}
      max: Amount must be at most ${max}
    name:
      required: Name is required
      max: Name must be less than 64 characters
    sendToSomeoneElse:
      required: If sending to someone else, the recipient name and email are required
    toName:
      required: To name is required
      max: To name must be less than 64 characters

